<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" />
  
  <!-- "360" Text -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">360</text>
  
  <!-- Circular Arrow -->
  <path d="M100 30 A60 60 0 1 1 99 30" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" />
  
  <!-- Algorithm Lines -->
  <g stroke="white" stroke-width="3">
    <line x1="70" y1="80" x2="130" y2="80" />
    <line x1="80" y1="90" x2="120" y2="90" />
    <line x1="90" y1="100" x2="110" y2="100" />
  </g>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#4299E1"/>
      <stop offset="100%" stop-color="#9F7AEA"/>
    </linearGradient>
  </defs>
</svg>
