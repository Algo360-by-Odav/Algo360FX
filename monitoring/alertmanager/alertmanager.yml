global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email-notifications'

receivers:
  - name: 'email-notifications'
    email_configs:
      - to: '{{ .GroupLabels.email }}'
        from: 'alerts@algo360fx.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: '{{ .GroupLabels.email_username }}'
        auth_identity: '{{ .GroupLabels.email_username }}'
        auth_password: '{{ .GroupLabels.email_password }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
