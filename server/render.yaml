services:
  - type: web
    name: algo360fx-server
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: algo360fx
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: META_API_TOKEN
        sync: false
      - key: MT5_ACCOUNT_ID
        sync: false
      - key: PORT
        value: 3000

databases:
  - name: algo360fx
    databaseName: algo360fx
    user: algo360fx_user
    plan: free
