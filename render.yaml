services:
  # Backend API Service
  - type: web
    name: algo360fx-server
    env: node
    region: singapore
    plan: free
    buildCommand: cd server && npm run build
    startCommand: cd server && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "18.x"
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: algo360fx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: algo360fx-cache
          property: connectionString
      - key: WS_ENABLED
        value: "true"
      - key: WS_PATH
        value: "/ws"
      - key: CORS_ORIGIN
        value: "https://algo360fx-client.onrender.com"

  # Frontend Static Site
  - type: web
    name: algo360fx-client
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://algo360fx-server.onrender.com"
      - key: VITE_WS_URL
        value: "wss://algo360fx-server.onrender.com"
      - key: VITE_WS_PATH
        value: "/ws"

  - type: redis
    name: algo360fx-cache
    plan: starter
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: algo360fx-db
    plan: free
    region: singapore
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
