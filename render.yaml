services:
  - type: web
    name: algo360fx-server
    env: node
    region: singapore
    plan: starter
    buildCommand: |
      cd server
      npm ci
      mkdir -p prisma
      cp -r prisma/* dist/prisma/
      npm run build
      cd dist
      npm ci --production
    startCommand: cd server && npm run start:prod
    healthCheckPath: /api/health
    healthCheckTimeout: 300
    autoDeploy: true
    scaling:
      minInstances: 1
      maxInstances: 1
      targetMemoryPercent: 90
      targetCPUPercent: 90
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MT5_ACCOUNT_ID
        sync: false
      - key: META_API_TOKEN
        sync: false
      - key: MT5_WS_PORT
        value: "6780"
      - key: CORS_ORIGIN
        value: "https://algo360fx-client.onrender.com"

  - type: web
    name: algo360fx-client
    env: node
    region: singapore
    plan: starter
    buildCommand: |
      cd client
      npm ci
      npm run build
    startCommand: cd client && npm run serve
    healthCheckPath: /
    healthCheckTimeout: 300
    autoDeploy: true
    scaling:
      minInstances: 1
      maxInstances: 1
      targetMemoryPercent: 90
      targetCPUPercent: 90
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://algo360fx-server.onrender.com

  - type: redis
    name: algo360fx-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    maxmemoryMB: 256
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  - type: redis
    name: algo360fx-cache
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: algo360fx-db
    plan: starter
    region: singapore
    ipAllowList: 
      - source: 0.0.0.0/0
        description: everywhere