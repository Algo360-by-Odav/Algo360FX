services:
  - type: web
    name: algo360fx-api
    env: node
    region: singapore
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: algo360fx-redis
          property: connectionString
      - key: CORS_ORIGIN
        value: https://algo360fx-frontend.onrender.com
      - key: WS_ENABLED
        value: "true"

  - type: web
    name: algo360fx-frontend
    env: node
    region: singapore
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: VITE_API_URL
        value: https://algo360fx-api.onrender.com
      - key: VITE_WS_URL
        value: wss://algo360fx-api.onrender.com
      - key: VITE_APP_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"

  - type: redis
    name: algo360fx-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
