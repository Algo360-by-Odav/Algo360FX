services:
  - type: web
    name: algo360fx-api
    env: node
    region: singapore
    plan: starter
    buildCommand: |
      cd server
      npm ci
      npm run build
      cd dist
      npm ci --production
    startCommand: cd server/dist && NODE_ENV=production node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: META_API_TOKEN
        sync: false
      - key: MT5_ACCOUNT_ID
        sync: false
      - key: MARKET_API_KEY
        sync: false
      - key: META_API_RETRY_ATTEMPTS
        value: "3"
      - key: META_API_RETRY_DELAY
        value: "1000"

  - type: web
    name: algo360fx-client
    env: static
    region: singapore
    plan: starter
    buildCommand: npm ci --production=false && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        value: https://algo360fx-api.onrender.com
      - key: VITE_WS_URL
        value: wss://algo360fx-api.onrender.com
      - key: REACT_APP_API_URL
        value: https://algo360fx-api.onrender.com

databases:
  - name: algo360fx-db
    plan: starter
    ipAllowList: 
      - source: 0.0.0.0/0
        description: everywhere