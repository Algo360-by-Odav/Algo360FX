services:
  - type: web
    name: algo360fx-server
    env: node
    region: singapore
    plan: starter
    buildCommand: |
      cd server
      npm install
      node scripts/generate-schema.js
      npx prisma generate
      npm run build
      cd dist
      npm install --production
    startCommand: node src/index.js
    healthCheckPath: /api/health
    healthCheckTimeout: 300
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: algo360fx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: algo360fx-redis
          type: redis
          property: connectionString
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: https://algo360fx-client.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000

  - type: redis
    name: algo360fx-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  - type: web
    name: algo360fx-client
    env: node
    region: singapore
    plan: starter
    buildCommand: cd client && npm install && npm run build
    startCommand: cd client && npm run preview
    healthCheckPath: /
    healthCheckTimeout: 300
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://algo360fx-server.onrender.com

databases:
  - name: algo360fx-db
    plan: starter
    region: singapore
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere