services:
  - type: web
    name: algo360fx-api
    env: node
    region: singapore
    plan: starter
    buildCommand: |
      cd api
      npm ci --production=false
      npx prisma generate
      npm run build
    startCommand: cd api && npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: algo360fx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: algo360fx-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://algo360fx.com,https://www.algo360fx.com
      - key: WS_ENABLED
        value: "true"
      - key: WS_PATH
        value: /ws
      - key: API_BASE_URL
        value: https://api.algo360fx.com
      - key: WS_BASE_URL
        value: wss://api.algo360fx.com
      - key: RATE_LIMIT_WINDOW
        value: "15"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: CACHE_TTL
        value: "3600"
      - key: SSL_ENABLED
        value: "true"
      - key: SECURITY_HEADERS_ENABLED
        value: "true"
      - key: HSTS_MAX_AGE
        value: "31536000"
      - key: CSP_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_METRICS
        value: "true"
      - key: METRICS_PORT
        value: "9090"
    autoDeploy: true
    domains:
      - api.algo360fx.com
    disk:
      name: algo360fx-api-data
      mountPath: /data
      sizeGB: 10

  - type: web
    name: algo360fx-frontend
    env: static
    region: singapore
    plan: starter
    buildCommand: |
      npm ci --production=false
      npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        value: https://algo360fx-server.onrender.com
      - key: VITE_WS_URL
        value: wss://algo360fx-server.onrender.com
      - key: VITE_WS_PATH
        value: /ws
      - key: VITE_APP_NAME
        value: Algo360FX
      - key: VITE_APP_DESCRIPTION
        value: Advanced Algorithmic Trading Platform
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_SUPPORT_EMAIL
        value: support@algo360fx.com
      - key: VITE_CONTACT_EMAIL
        value: contact@algo360fx.com
      - key: VITE_ENABLE_ANALYTICS
        value: "true"
    autoDeploy: true
    domains:
      - algo360fx.com
      - www.algo360fx.com
    pullRequestPreviewsEnabled: true

  - type: redis
    name: algo360fx-redis
    region: singapore
    ipAllowList: 
      - source: 0.0.0.0/0
        description: everywhere
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: algo360fx-db
    plan: starter
    ipAllowList: 
      - source: 0.0.0.0/0
        description: everywhere
