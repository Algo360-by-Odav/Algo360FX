services:
  - type: web
    name: algo360fx-api
    env: node
    region: singapore
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - api.algo360fx.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: algo360fx-redis
          property: connectionString
      - key: CORS_ORIGIN
        value: https://algo360fx-frontend.onrender.com
      - key: WS_ENABLED
        value: "true"
      - key: RATE_LIMIT_WINDOW
        value: "15"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: CACHE_TTL
        value: "3600"
      - key: SSL_ENABLED
        value: "true"
      - key: SSL_CERT
        sync: false
      - key: SSL_KEY
        sync: false
      - key: SSL_CA
        sync: false
      - key: SECURITY_HEADERS_ENABLED
        value: "true"
      - key: HSTS_MAX_AGE
        value: "31536000"
      - key: CSP_ENABLED
        value: "true"
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80

  - type: web
    name: algo360fx-frontend
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    domains:
      - algo360fx.com
      - www.algo360fx.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: VITE_API_URL
        value: https://api.algo360fx.com
      - key: VITE_WS_URL
        value: wss://api.algo360fx.com
      - key: HOST
        value: "0.0.0.0"
      - key: SSL_ENABLED
        value: "true"
      - key: SECURITY_HEADERS_ENABLED
        value: "true"
      - key: HSTS_MAX_AGE
        value: "31536000"
      - key: CSP_ENABLED
        value: "true"
    scaling:
      minInstances: 1
      maxInstances: 2
      targetMemoryPercent: 80
      targetCPUPercent: 80

  - type: redis
    name: algo360fx-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
