services:
  # Backend API Service
  - type: web
    name: algo360fx-server
    env: node
    region: singapore
    plan: free
    buildCommand: |
      cd server
      npm ci
      npm run build
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "18.x"
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "8080"
      - key: WS_ENABLED
        value: "true"
      - key: WS_PATH
        value: "/ws"
      - key: CORS_ORIGIN
        value: "https://algo360fx-client.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: algo360fx-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: algo360fx-cache
          property: connectionString
    headers:
      - path: /ws
        name: Upgrade
        value: websocket
      - path: /ws
        name: Connection
        value: upgrade
    routes:
      - type: rewrite
        source: /ws
        destination: ws://localhost:8080/ws
      - type: rewrite
        source: /*
        destination: /

  # Frontend Static Site
  - type: web
    name: algo360fx-client
    env: node
    region: singapore
    plan: free
    buildCommand: |
      npm ci
      npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "18.x"
      - key: NODE_ENV
        value: "production"
      - key: VITE_API_URL
        value: "https://algo360fx-server.onrender.com/api"
      - key: VITE_WS_URL
        value: "wss://algo360fx-server.onrender.com"
      - key: VITE_WS_PATH
        value: "/ws"
      - key: VITE_APP_NAME
        value: "Algo360FX"
      - key: VITE_APP_VERSION
        value: "1.0.0"

  # Redis Cache Service
  - type: redis
    name: algo360fx-cache
    region: singapore
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: algo360fx-db
    region: singapore
    plan: free
