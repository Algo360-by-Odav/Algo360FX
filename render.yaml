services:
  - type: web
    name: algo360fx-server
    env: node
    region: singapore
    plan: starter
    buildCommand: cd server && chmod +x build.sh && ./build.sh
    startCommand: cd server && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: META_API_TOKEN
        sync: false
      - key: MT5_ACCOUNT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    autoDeploy: true
    domains:
      - api.algo360fx.com
    disk:
      name: algo360fx-api-data
      mountPath: /data
      sizeGB: 10

  - type: web
    name: algo360fx-frontend
    env: static
    region: singapore
    plan: starter
    buildCommand: npm ci --production=false && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: VITE_API_URL
        value: https://api.algo360fx.com
      - key: VITE_WS_URL
        value: wss://api.algo360fx.com
      - key: VITE_WS_PATH
        value: /ws
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    domains:
      - algo360fx.com
      - www.algo360fx.com
    pullRequestPreviewsEnabled: true
    autoDeploy: true

  - type: redis
    name: algo360fx-cache
    region: singapore
    ipAllowList: 
      - source: 0.0.0.0/0
        description: everywhere
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: algo360fx-db
    plan: starter
    ipAllowList: 
      - source: 0.0.0.0/0
        description: everywhere
